pre-commit:
  parallel: true
  commands:
    prettier:
      run: npm run prettier:write
      stage_fixed: true
      include:
        - "**/*.{js,jsx,ts,tsx,json,css,md,html}"
    lint:
      run: npm run lint
      include:
        - "**/*.{js,jsx,ts,tsx}"

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit "$1"
      include:
        - "**/*"

pre-push:
  commands:
    typecheck:
      run: npm run typecheck
      include:
        - "**/*.{ts,tsx}"
    test:
      run: npm run test || true
      include:
        - "**/*"
